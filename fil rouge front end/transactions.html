<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transactions – Personal Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; }
    .input-field { background: #0f172a; border: 1px solid #334155; color: #f1f5f9; border-radius: 12px; padding: 10px 16px; font-size: 14px; width: 100%; transition: all 0.2s; }
    .input-field:focus { outline: none; border-color: #6366f1; }
    .input-field option { background: #1e293b; }
    tr:hover td { background: rgba(255,255,255,0.02); }
  </style>
</head>
<body>
  <div id="nav-container"></div>

  <main class="lg:ml-64 p-6 min-h-screen">
    <div class="mt-8 lg:mt-0 mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-white">Transactions</h1>
        <p class="text-slate-400 text-sm mt-1">Historique complet de vos opérations</p>
      </div>
      <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Ajouter
      </button>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
      <div class="card p-4 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-green-500/20 flex items-center justify-center">
          <svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11l5-5m0 0l5 5m-5-5v12"/></svg>
        </div>
        <div>
          <p class="text-slate-400 text-xs">Total Revenus</p>
          <p class="text-white font-bold text-xl">+3 200 €</p>
        </div>
      </div>
      <div class="card p-4 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-red-500/20 flex items-center justify-center">
          <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 13l-5 5m0 0l-5-5m5 5V6"/></svg>
        </div>
        <div>
          <p class="text-slate-400 text-xs">Total Dépenses</p>
          <p class="text-white font-bold text-xl">-1 890 €</p>
        </div>
      </div>
      <div class="card p-4 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-indigo-500/20 flex items-center justify-center">
          <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
        </div>
        <div>
          <p class="text-slate-400 text-xs">Solde Net</p>
          <p class="text-white font-bold text-xl">+1 310 €</p>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="card p-4 mb-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
        <input type="text" placeholder="🔍 Rechercher..." oninput="applyFilters()" id="search" class="input-field"/>
        <select onchange="applyFilters()" id="filter-type" class="input-field">
          <option value="">Tous les types</option>
          <option value="Revenu">Revenus</option>
          <option value="Dépense">Dépenses</option>
          <option value="Transfert">Transferts</option>
        </select>
        <select onchange="applyFilters()" id="filter-cat" class="input-field">
          <option value="">Toutes catégories</option>
          <option>Logement</option>
          <option>Alimentation</option>
          <option>Transport</option>
          <option>Loisirs</option>
          <option>Salaire</option>
          <option>Épargne</option>
        </select>
        <input type="month" onchange="applyFilters()" id="filter-month" class="input-field" value="2024-01"/>
        <button onclick="resetFilters()" class="input-field text-slate-400 hover:text-white hover:border-slate-500 text-center cursor-pointer">Réinitialiser</button>
      </div>
    </div>

    <!-- Table -->
    <div class="card overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="border-b border-slate-700">
            <tr>
              <th class="text-left text-slate-400 font-medium p-4">Description</th>
              <th class="text-left text-slate-400 font-medium p-4">Catégorie</th>
              <th class="text-left text-slate-400 font-medium p-4">Type</th>
              <th class="text-left text-slate-400 font-medium p-4">Date</th>
              <th class="text-right text-slate-400 font-medium p-4">Montant</th>
              <th class="text-center text-slate-400 font-medium p-4">Actions</th>
            </tr>
          </thead>
          <tbody id="tx-table"></tbody>
        </table>
      </div>
      <div class="p-4 border-t border-slate-700 flex items-center justify-between">
        <p class="text-slate-500 text-xs" id="tx-count">0 transactions</p>
        <div class="flex gap-2" id="pagination"></div>
      </div>
    </div>
  </main>

  <!-- Add Transaction Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-white font-semibold text-lg" id="modal-title">Nouvelle Transaction</h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-white">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form onsubmit="saveTransaction(event)" class="space-y-4">
        <div>
          <label class="text-slate-300 text-sm font-medium block mb-1.5">Description</label>
          <input type="text" id="tx-desc" placeholder="Ex: Courses Carrefour" class="input-field" required/>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-slate-300 text-sm font-medium block mb-1.5">Montant (€)</label>
            <input type="number" id="tx-amount" placeholder="0.00" step="0.01" min="0" class="input-field" required/>
          </div>
          <div>
            <label class="text-slate-300 text-sm font-medium block mb-1.5">Type</label>
            <select id="tx-type" class="input-field">
              <option value="Dépense">Dépense</option>
              <option value="Revenu">Revenu</option>
              <option value="Transfert">Transfert</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-slate-300 text-sm font-medium block mb-1.5">Catégorie</label>
            <select id="tx-cat" class="input-field">
              <option>Alimentation</option>
              <option>Logement</option>
              <option>Transport</option>
              <option>Loisirs</option>
              <option>Salaire</option>
              <option>Épargne</option>
              <option>Santé</option>
              <option>Autre</option>
            </select>
          </div>
          <div>
            <label class="text-slate-300 text-sm font-medium block mb-1.5">Date</label>
            <input type="date" id="tx-date" class="input-field" required/>
          </div>
        </div>
        <div>
          <label class="text-slate-300 text-sm font-medium block mb-1.5">Récurrence</label>
          <select id="tx-recur" class="input-field">
            <option value="Ponctuelle">Ponctuelle</option>
            <option value="Mensuelle">Mensuelle</option>
            <option value="Annuelle">Annuelle</option>
          </select>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeModal()" class="flex-1 py-2.5 rounded-xl bg-slate-700 text-slate-300 text-sm hover:bg-slate-600">Annuler</button>
          <button type="submit" class="flex-1 py-2.5 rounded-xl bg-indigo-600 text-white text-sm hover:bg-indigo-700 font-medium">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="nav.js"></script>
  <script>
    document.getElementById('nav-container').innerHTML = renderNav('transactions');
    document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];

    const catIcons = { Alimentation:'🛒', Logement:'🏠', Transport:'🚗', Loisirs:'🎬', Salaire:'💰', Épargne:'🏦', Santé:'💊', Transfert:'🔄', Autre:'📦' };
    let transactions = [
      { id:1, desc:'Salaire Janvier', cat:'Salaire', type:'Revenu', date:'2024-01-15', amount:3200, recur:'Mensuelle' },
      { id:2, desc:'Loyer', cat:'Logement', type:'Dépense', date:'2024-01-05', amount:850, recur:'Mensuelle' },
      { id:3, desc:'Courses Carrefour', cat:'Alimentation', type:'Dépense', date:'2024-01-12', amount:124, recur:'Ponctuelle' },
      { id:4, desc:'Netflix', cat:'Loisirs', type:'Dépense', date:'2024-01-11', amount:15, recur:'Mensuelle' },
      { id:5, desc:'Virement épargne', cat:'Épargne', type:'Transfert', date:'2024-01-10', amount:500, recur:'Mensuelle' },
      { id:6, desc:'Essence', cat:'Transport', type:'Dépense', date:'2024-01-09', amount:65, recur:'Ponctuelle' },
      { id:7, desc:'Restaurant', cat:'Alimentation', type:'Dépense', date:'2024-01-08', amount:48, recur:'Ponctuelle' },
      { id:8, desc:'Pharmacie', cat:'Santé', type:'Dépense', date:'2024-01-07', amount:32, recur:'Ponctuelle' },
      { id:9, desc:'Abonnement Spotify', cat:'Loisirs', type:'Dépense', date:'2024-01-06', amount:10, recur:'Mensuelle' },
      { id:10, desc:'Freelance', cat:'Salaire', type:'Revenu', date:'2024-01-03', amount:450, recur:'Ponctuelle' },
    ];
    let editId = null;
    let filtered = [...transactions];
    const PAGE_SIZE = 6;
    let currentPage = 1;

    function applyFilters() {
      const q = document.getElementById('search').value.toLowerCase();
      const type = document.getElementById('filter-type').value;
      const cat = document.getElementById('filter-cat').value;
      filtered = transactions.filter(t =>
        (!q || t.desc.toLowerCase().includes(q) || t.cat.toLowerCase().includes(q)) &&
        (!type || t.type === type) &&
        (!cat || t.cat === cat)
      );
      currentPage = 1;
      renderTable();
    }

    function resetFilters() {
      document.getElementById('search').value = '';
      document.getElementById('filter-type').value = '';
      document.getElementById('filter-cat').value = '';
      filtered = [...transactions];
      currentPage = 1;
      renderTable();
    }

    function renderTable() {
      const start = (currentPage - 1) * PAGE_SIZE;
      const page = filtered.slice(start, start + PAGE_SIZE);
      document.getElementById('tx-count').textContent = `${filtered.length} transaction${filtered.length > 1 ? 's' : ''}`;
      document.getElementById('tx-table').innerHTML = page.length ? page.map(t => `
        <tr class="border-b border-slate-800 cursor-pointer">
          <td class="p-4">
            <div class="flex items-center gap-3">
              <span class="text-xl">${catIcons[t.cat] || '📦'}</span>
              <div>
                <p class="text-white font-medium">${t.desc}</p>
                <p class="text-slate-500 text-xs">${t.recur}</p>
              </div>
            </div>
          </td>
          <td class="p-4"><span class="px-2 py-1 rounded-lg bg-slate-700 text-slate-300 text-xs">${t.cat}</span></td>
          <td class="p-4"><span class="px-2 py-1 rounded-lg text-xs font-medium ${t.type==='Revenu'?'bg-green-500/20 text-green-400':t.type==='Dépense'?'bg-red-500/20 text-red-400':'bg-indigo-500/20 text-indigo-400'}">${t.type}</span></td>
          <td class="p-4 text-slate-400">${new Date(t.date).toLocaleDateString('fr-FR')}</td>
          <td class="p-4 text-right font-semibold ${t.type==='Revenu'?'text-green-400':t.type==='Dépense'?'text-red-400':'text-indigo-400'}">${t.type==='Revenu'?'+':'-'}${t.amount.toLocaleString()} €</td>
          <td class="p-4 text-center">
            <div class="flex items-center justify-center gap-2">
              <button onclick="editTx(${t.id})" class="p-1.5 rounded-lg bg-slate-700 text-slate-400 hover:text-white hover:bg-slate-600 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
              </button>
              <button onclick="deleteTx(${t.id})" class="p-1.5 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </td>
        </tr>`).join('') : '<tr><td colspan="6" class="p-8 text-center text-slate-500">Aucune transaction trouvée</td></tr>';

      const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
      document.getElementById('pagination').innerHTML = Array.from({length: totalPages}, (_, i) => `
        <button onclick="goPage(${i+1})" class="px-3 py-1.5 rounded-lg text-xs ${currentPage===i+1?'bg-indigo-600 text-white':'bg-slate-800 text-slate-400 hover:bg-slate-700'}">${i+1}</button>`).join('');
    }

    function goPage(p) { currentPage = p; renderTable(); }

    function openModal() {
      editId = null;
      document.getElementById('modal-title').textContent = 'Nouvelle Transaction';
      document.getElementById('tx-desc').value = '';
      document.getElementById('tx-amount').value = '';
      document.getElementById('tx-type').value = 'Dépense';
      document.getElementById('tx-cat').value = 'Alimentation';
      document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];
      document.getElementById('tx-recur').value = 'Ponctuelle';
      document.getElementById('modal').classList.remove('hidden');
    }

    function editTx(id) {
      const t = transactions.find(x => x.id === id);
      editId = id;
      document.getElementById('modal-title').textContent = 'Modifier la Transaction';
      document.getElementById('tx-desc').value = t.desc;
      document.getElementById('tx-amount').value = t.amount;
      document.getElementById('tx-type').value = t.type;
      document.getElementById('tx-cat').value = t.cat;
      document.getElementById('tx-date').value = t.date;
      document.getElementById('tx-recur').value = t.recur;
      document.getElementById('modal').classList.remove('hidden');
    }

    function deleteTx(id) {
      transactions = transactions.filter(t => t.id !== id);
      filtered = filtered.filter(t => t.id !== id);
      renderTable();
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    function saveTransaction(e) {
      e.preventDefault();
      const data = {
        id: editId || Date.now(),
        desc: document.getElementById('tx-desc').value,
        amount: parseFloat(document.getElementById('tx-amount').value),
        type: document.getElementById('tx-type').value,
        cat: document.getElementById('tx-cat').value,
        date: document.getElementById('tx-date').value,
        recur: document.getElementById('tx-recur').value,
      };
      if (editId) {
        const idx = transactions.findIndex(t => t.id === editId);
        transactions[idx] = data;
      } else {
        transactions.unshift(data);
      }
      filtered = [...transactions];
      renderTable();
      closeModal();
    }

    renderTable();
  </script>
</body>
</html>
